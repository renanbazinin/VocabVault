<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Book body -->
  <rect x="8" y="12" width="48" height="42" rx="4" fill="#44aa02" opacity="0.15"/>
  <rect x="8" y="12" width="48" height="42" rx="4" stroke="#44aa02" stroke-width="2.5" fill="none"/>
  <!-- Book spine -->
  <line x1="32" y1="12" x2="32" y2="54" stroke="#44aa02" stroke-width="2" opacity="0.4"/>
  <!-- Left page lines -->
  <line x1="15" y1="22" x2="27" y2="22" stroke="#44aa02" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="28" x2="25" y2="28" stroke="#44aa02" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="34" x2="26" y2="34" stroke="#44aa02" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="40" x2="24" y2="40" stroke="#44aa02" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Right page - magnifying glass with "W" -->
  <circle cx="45" cy="30" r="10" stroke="#44aa02" stroke-width="2.5" fill="white" fill-opacity="0.9"/>
  <line x1="52" y1="37" x2="57" y2="42" stroke="#44aa02" stroke-width="2.5" stroke-linecap="round"/>
  <!-- "W" inside magnifier -->
  <text x="45" y="35" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#44aa02">W</text>
  <!-- Sparkle dots -->
  <circle cx="39" cy="18" r="1.5" fill="#44aa02" opacity="0.6"/>
  <circle cx="53" cy="22" r="1" fill="#44aa02" opacity="0.4"/>
  <circle cx="36" cy="44" r="1.2" fill="#44aa02" opacity="0.5"/>
</svg>
